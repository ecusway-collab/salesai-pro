<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primitive Solution — Login / Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root { --green:#2d8653; --green-dark:#1a5c38; }
body { background:#f0f4f1; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.auth-card { background:#fff; border-radius:16px; padding:40px; width:100%; max-width:440px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
.brand { color:var(--green-dark); font-weight:800; font-size:1.4rem; text-align:center; margin-bottom:8px; }
.brand i { color:var(--green); }
.tab-btn { border:none; background:none; padding:10px 24px; border-radius:8px; font-weight:600; color:#6c757d; cursor:pointer; transition:.2s; }
.tab-btn.active { background:var(--green); color:#fff; }
.form-control:focus { border-color:var(--green); box-shadow:0 0 0 .2rem rgba(45,134,83,.2); }
.btn-green { background:var(--green); color:#fff; border:none; width:100%; padding:12px; border-radius:8px; font-weight:700; font-size:1rem; }
.btn-green:hover { background:var(--green-dark); color:#fff; }
.plan-card { border:2px solid #e9ecef; border-radius:10px; padding:12px 16px; cursor:pointer; transition:.2s; }
.plan-card.selected { border-color:var(--green); background:#f0faf4; }
.plan-card input[type=radio] { accent-color:var(--green); }
.divider { text-align:center; color:#6c757d; font-size:.85rem; margin:16px 0; position:relative; }
.divider::before, .divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:#e9ecef; }
.divider::before { left:0; } .divider::after { right:0; }
.alert-banner { display:none; border-radius:8px; padding:14px 16px; font-size:.92rem; margin-bottom:16px; font-weight:500; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
.shake { animation:shake .4s ease; }
.field-error { border-color:#dc3545 !important; box-shadow:0 0 0 .2rem rgba(220,53,69,.2) !important; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="brand"><i class="bi bi-lightning-fill"></i> Primitive Solution</div>
  <p class="text-center text-muted mb-4" style="font-size:.9rem">AI-powered sales automation platform</p>

  <!-- Tab switcher -->
  <div class="d-flex gap-1 bg-light p-1 rounded mb-4">
    <button class="tab-btn active flex-grow-1" id="tab-login" onclick="showTab('login')">Log In</button>
    <button class="tab-btn flex-grow-1" id="tab-register" onclick="showTab('register')">Sign Up Free</button>
  </div>

  <div id="alertBanner" class="alert-banner"></div>

  <!-- LOGIN FORM -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-green" id="loginBtn">Log In</button>
    <div class="divider">or</div>
    <p class="text-center text-muted small">Don't have an account? <a href="#" onclick="showTab('register')" style="color:var(--green)">Sign up free →</a></p>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
    <div class="mb-3">
      <label class="form-label fw-semibold">Your Name</label>
      <input type="text" class="form-control" id="regName" placeholder="John Smith" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" class="form-control" id="regPassword" placeholder="Min 8 characters" minlength="8" required>
    </div>

    <!-- Plan selection -->
    <div class="mb-4">
      <label class="form-label fw-semibold">Choose Your Plan</label>
      <div class="d-flex flex-column gap-2">
        <label class="plan-card" id="plan-starter">
          <div class="d-flex align-items-center gap-2">
            <input type="radio" name="plan" value="starter" checked onchange="selectPlan('starter')">
            <div class="flex-grow-1"><strong>Starter</strong> — $49/mo</div>
            <small class="text-muted">100 leads · 50 calls</small>
          </div>
        </label>
        <label class="plan-card" id="plan-pro">
          <div class="d-flex align-items-center gap-2">
            <input type="radio" name="plan" value="pro" onchange="selectPlan('pro')">
            <div class="flex-grow-1"><strong>Pro</strong> — $99/mo <span class="badge bg-success ms-1" style="font-size:.7rem">Popular</span></div>
            <small class="text-muted">500 leads · 250 calls</small>
          </div>
        </label>
        <label class="plan-card" id="plan-agency">
          <div class="d-flex align-items-center gap-2">
            <input type="radio" name="plan" value="agency" onchange="selectPlan('agency')">
            <div class="flex-grow-1"><strong>Agency</strong> — $199/mo</div>
            <small class="text-muted">Unlimited</small>
          </div>
        </label>
      </div>
    </div>

    <button type="submit" class="btn-green" id="registerBtn">Start 14-Day Free Trial →</button>
    <p class="text-center text-muted small mt-2">No credit card required · Cancel anytime</p>
    <div class="divider">or</div>
    <p class="text-center text-muted small">Already have an account? <a href="#" onclick="showTab('login')" style="color:var(--green)">Log in →</a></p>
  </form>
</div>

<script>
// ── Tab switching ──────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  clearAlert();
}

function selectPlan(plan) {
  ['starter','pro','agency'].forEach(p => document.getElementById('plan-'+p).classList.toggle('selected', p === plan));
}

// Pre-select from URL hash (e.g. /login#register?plan=pro)
window.addEventListener('load', () => {
  const hash = window.location.hash;
  if (hash.includes('register')) showTab('register');
  const planMatch = hash.match(/plan=(\w+)/);
  if (planMatch) {
    selectPlan(planMatch[1]);
    document.querySelector(`input[value="${planMatch[1]}"]`).checked = true;
  }
  selectPlan('starter'); // default highlight
});

// ── Fetch with timeout ────────────────────────────────────────────────────────
async function fetchWithTimeout(url, options, timeoutMs = 40000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

// ── Auth ───────────────────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  clearFieldErrors();
  clearAlert();
  const btn = document.getElementById('loginBtn');
  setLoading(btn, true, '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...');

  // After 4 seconds still loading → show "warming up" notice
  const warmupTimer = setTimeout(() => {
    showAlert('<i class="bi bi-hourglass-split me-2"></i>Server is starting up — please wait a moment...', 'warning');
  }, 4000);

  try {
    const form = new URLSearchParams();
    form.append('username', document.getElementById('loginEmail').value);
    form.append('password', document.getElementById('loginPassword').value);
    const res = await fetchWithTimeout('/auth/login', { method: 'POST', body: form });
    clearTimeout(warmupTimer);
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if (!res.ok) {
      const raw = (data.detail || '').toLowerCase();
      let msg = 'Login failed. Please try again.';
      if (raw.includes('incorrect') || raw.includes('password') || raw.includes('unauthorized')) {
        msg = 'Incorrect email or password. Please check and try again.';
        setFieldError('loginEmail'); setFieldError('loginPassword');
      } else if (raw.includes('not found') || raw.includes('no user')) {
        msg = 'No account found with that email. Did you mean to sign up?';
        setFieldError('loginEmail');
      } else if (data.detail) {
        msg = data.detail;
      }
      throw new Error(msg);
    }
    clearAlert();
    showAlert('<i class="bi bi-check-circle-fill me-2"></i>Logged in! Redirecting...', 'success');
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(data.user));
    setTimeout(() => { window.location.href = '/dashboard'; }, 500);
  } catch(err) {
    clearTimeout(warmupTimer);
    const msg = err.name === 'AbortError'
      ? 'The server took too long to respond. Please try again in a moment.'
      : (err.message === 'Failed to fetch'
        ? 'Could not connect to the server. Please check your connection and try again.'
        : err.message);
    showAlert('<i class="bi bi-exclamation-circle-fill me-2"></i>' + msg, 'danger');
    setLoading(btn, false, 'Log In');
  }
}

async function handleRegister(e) {
  e.preventDefault();
  clearFieldErrors();
  clearAlert();
  const btn = document.getElementById('registerBtn');
  setLoading(btn, true, '<span class="spinner-border spinner-border-sm me-2"></span>Creating your account...');

  const warmupTimer = setTimeout(() => {
    showAlert('<i class="bi bi-hourglass-split me-2"></i>Server is starting up — please wait a moment...', 'warning');
  }, 4000);

  const plan = document.querySelector('input[name="plan"]:checked')?.value || 'starter';
  try {
    const res = await fetchWithTimeout('/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
        plan,
      })
    });
    clearTimeout(warmupTimer);
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if (!res.ok) {
      const raw = (data.detail || '').toLowerCase();
      let msg = 'Registration failed. Please try again.';
      if (raw.includes('already')) {
        msg = 'That email is already registered. Try logging in instead.';
        setFieldError('regEmail');
      } else if (raw.includes('email')) {
        msg = 'Please enter a valid email address.';
        setFieldError('regEmail');
      } else if (raw.includes('password')) {
        msg = 'Password must be at least 8 characters.';
        setFieldError('regPassword');
      } else if (data.detail) {
        msg = data.detail;
      }
      throw new Error(msg);
    }
    clearAlert();
    showAlert('<i class="bi bi-check-circle-fill me-2"></i>Account created! Redirecting to your dashboard...', 'success');
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(data.user));
    setTimeout(() => { window.location.href = '/dashboard'; }, 700);
  } catch(err) {
    clearTimeout(warmupTimer);
    const msg = err.name === 'AbortError'
      ? 'The server took too long to respond. Please try again in a moment.'
      : (err.message === 'Failed to fetch'
        ? 'Could not connect to the server. Please check your connection and try again.'
        : err.message);
    showAlert('<i class="bi bi-exclamation-circle-fill me-2"></i>' + msg, 'danger');
    setLoading(btn, false, 'Start 14-Day Free Trial →');
  }
}

function setLoading(btn, loading, html) {
  btn.innerHTML = html;
  btn.disabled = loading;
  btn.style.opacity = loading ? '0.85' : '1';
}

function showAlert(msg, type='danger') {
  const el = document.getElementById('alertBanner');
  el.className = `alert-banner alert alert-${type}`;
  el.innerHTML = msg;
  el.style.display = '';
  el.classList.remove('shake');
  void el.offsetWidth; // force reflow so shake restarts
  el.classList.add('shake');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearAlert() {
  const el = document.getElementById('alertBanner');
  el.style.display = 'none';
  el.classList.remove('shake');
}

function setFieldError(id) {
  document.getElementById(id)?.classList.add('field-error');
}

function clearFieldErrors() {
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
}
</script>
</body>
</html>
